<body>
<div id="app"></div>
<script>
const JSONBIN_API_KEY='$2a$10$PSDa.UDyYUdLIuiwEJ4AIuGeKsdmgZN70PiiTeUDGhdLP4vqqdize';
const JSONBIN_BIN_ID='69c4ecdcaa77b81da91ef8b8';
const ADMIN_PASSWORD='Alma';

let commesse=[],archived=[],syncStatus='loading',isAdmin=false,saving=false;
const LOCAL_KEY='almatech-commesse-local',ARCHIVE_KEY='almatech-archive-local',ADMIN_KEY='almatech-admin';
try{if(localStorage.getItem(ADMIN_KEY)==='1')isAdmin=true;}catch(e){}
try{var a=localStorage.getItem(ARCHIVE_KEY);if(a)archived=JSON.parse(a);}catch(e){}

// =============================================
// CLOUD SYNC CON MERGE (anti-perdita dati)
// =============================================
async function fetchCloud(){
  var r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_API_KEY}});
  if(!r.ok)throw new Error('Fetch failed');
  var data=await r.json(),rec=data.record;
  var c=[], ar=[];
  if(Array.isArray(rec)){c=rec;}
  else{c=Array.isArray(rec.commesse)?rec.commesse:[];ar=Array.isArray(rec.archived)?rec.archived:[];}
  return{commesse:c,archived:ar};
}

async function pushCloud(c,ar){
  var r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID,{
    method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},
    body:JSON.stringify({commesse:c,archived:ar})
  });
  if(!r.ok)throw new Error('Save failed');
}

async function loadFromCloud(){
  if(saving)return; // non sovrascrivere durante un salvataggio
  syncStatus='loading';render();
  try{
    var data=await fetchCloud();
    // Merge: mantieni archivio locale + server
    var aMap={};
    archived.forEach(function(c){aMap[c.id]=c;});
    data.archived.forEach(function(c){if(!aMap[c.id]){archived.push(c);aMap[c.id]=c;}});
    // Commesse dal server, escludendo quelle già archiviate localmente
    commesse=data.commesse.filter(function(c){return !aMap[c.id];});
    localStorage.setItem(LOCAL_KEY,JSON.stringify(commesse));
    localStorage.setItem(ARCHIVE_KEY,JSON.stringify(archived));
    syncStatus='ok';
  }catch(e){
    try{var d=localStorage.getItem(LOCAL_KEY);if(d)commesse=JSON.parse(d);}catch(x){}
    try{var a2=localStorage.getItem(ARCHIVE_KEY);if(a2)archived=JSON.parse(a2);}catch(x){}
    syncStatus='error';
  }
  checkAutoArchive();
  render();
}

// MERGE: prima di salvare, scarica i dati freschi dal server
// e unisci le modifiche locali, così nulla va perso
async function saveToCloud(){
  if(saving)return; // evita salvataggi concorrenti
  saving=true;
  localStorage.setItem(LOCAL_KEY,JSON.stringify(commesse));
  localStorage.setItem(ARCHIVE_KEY,JSON.stringify(archived));
  syncStatus='loading';render();
  try{
    // 1. Scarica dati freschi dal server
    var fresh=await fetchCloud();
    // 2. Merge commesse: le nostre modifiche locali hanno priorità per ID,
    //    ma aggiungiamo anche commesse dal server che non abbiamo in locale
    //    (aggiunte da altri dispositivi)
    var localMap={};
    commesse.forEach(function(c){localMap[c.id]=c;});
    // Mappa archivio per escludere commesse già archiviate
    var archiveMap={};
    archived.forEach(function(c){archiveMap[c.id]=c;});
    // Aggiungi commesse dal server che non esistono in locale E non sono archiviate
    fresh.commesse.forEach(function(c){
      if(!localMap[c.id]&&!archiveMap[c.id]){
        // Commessa aggiunta da un altro dispositivo (e non archiviata): aggiungi
        commesse.push(c);
        localMap[c.id]=c;
      }
      // Se esiste in entrambi, la versione locale ha priorità
      // (perché è quella che l'utente ha appena modificato)
    });
    // 3. Merge archivio: unisci senza duplicati
    fresh.archived.forEach(function(c){
      if(!archiveMap[c.id]){archived.push(c);archiveMap[c.id]=c;}
    });
    // 4. Salva il risultato unificato
    await pushCloud(commesse,archived);
    localStorage.setItem(LOCAL_KEY,JSON.stringify(commesse));
    localStorage.setItem(ARCHIVE_KEY,JSON.stringify(archived));
    syncStatus='ok';
  }catch(e){
    console.error('Save/merge error:',e);
    syncStatus='error';
  }
  saving=false;
  render();
}

setInterval(loadFromCloud,15000);
setInterval(function(){if(commesse.some(function(c){return c.stato==='PROGRESS';}))render();},60000);

// Auto-archive venerdì dopo le 20
function checkAutoArchive(){
  var now=new Date();
  if(now.getDay()===5&&now.getHours()>=20){
    var lastA=localStorage.getItem('almatech-last-archive');
    var today=now.toISOString().slice(0,10);
    if(lastA!==today){doArchive();localStorage.setItem('almatech-last-archive',today);}
  }
}
function doArchive(){
  var done=commesse.filter(function(c){return c.stato==='DONE';});
  if(done.length===0)return;
  var ad=new Date().toISOString();
  done.forEach(function(c){c.archivedAt=ad;});
  archived=done.concat(archived);
  commesse=commesse.filter(function(c){return c.stato!=='DONE';});
  saveToCloud();
}

function playChime(){
  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var tone=function(f,s,d,v){v=v||0.15;var o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+s);g.gain.setValueAtTime(v,ctx.currentTime+s);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s+d);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d);};tone(587,0,0.2,0.2);tone(740,0.12,0.2,0.18);tone(880,0.24,0.35,0.15);}catch(e){}
}

var currentTab='board',archiveFilterOp='ALL';
var showForm=false,showPwModal=false,showArchiveConfirm=false,editingId=null,filterStato='ALL',confirmDelete=null,expandedNote=null,pwError='';
var formData={descrizione:'',operatore:'Leandro',stato:'TODO',note:''};
var STATI={TODO:{label:'Da fare',color:'#F59E0B'},PROGRESS:{label:'In corso',color:'#3B82F6'},DONE:{label:'Completato',color:'#10B981'}};
var OPS=['Leandro','Andrea'];
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// =============================================
// TIME HELPERS
// =============================================
var LUNCH={Leandro:{start:12,end:13},Andrea:{start:12.5,end:13.5}};
function nowISO(){return new Date().toISOString();}
function parseTS(ts){if(!ts)return null;var d=new Date(ts);return isNaN(d.getTime())?null:d;}
function formatDuration(ms){
  if(!ms||ms<0)return'';
  var mins=Math.floor(ms/60000),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
  if(days>0)return days+'g '+(hrs%24)+'h';
  if(hrs>0)return hrs+'h '+(mins%60)+'m';
  return mins+'m';
}
function getTimerClass(ms){if(!ms)return'timer-ok';var hrs=ms/3600000;if(hrs>=8)return'timer-danger';if(hrs>=4)return'timer-warn';return'timer-ok';}
function getLunchMinutes(startDate,endDate,operatore){
  if(!startDate||!endDate)return 0;
  var lunch=LUNCH[operatore];if(!lunch)return 0;
  var totalPause=0,d=new Date(startDate);d.setHours(0,0,0,0);
  var endDay=new Date(endDate);endDay.setHours(23,59,59,999);
  while(d<=endDay){
    var lStart=new Date(d);lStart.setHours(Math.floor(lunch.start),(lunch.start%1)*60,0,0);
    var lEnd=new Date(d);lEnd.setHours(Math.floor(lunch.end),(lunch.end%1)*60,0,0);
    var oS=Math.max(startDate.getTime(),lStart.getTime()),oE=Math.min(endDate.getTime(),lEnd.getTime());
    if(oE>oS)totalPause+=(oE-oS);
    d.setDate(d.getDate()+1);
  }
  return totalPause;
}
function getNetElapsed(startISO,endISO,operatore){
  var s=parseTS(startISO),e=endISO?parseTS(endISO):new Date();
  if(!s||!e)return 0;
  return Math.max(0,e.getTime()-s.getTime()-getLunchMinutes(s,e,operatore));
}
function getWeekStart(){var d=new Date();d.setHours(0,0,0,0);var day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);d.setDate(diff);return d;}
function getTodayStart(){var d=new Date();d.setHours(0,0,0,0);return d;}
function getAllDone(op){
  return commesse.filter(function(c){return c.operatore===op&&c.stato==='DONE';}).concat(archived.filter(function(c){return c.operatore===op;}));
}
function getCompletedThisWeek(op){
  var ws=getWeekStart().getTime();
  return getAllDone(op).filter(function(c){var t=parseTS(c.completedAt);return t&&t.getTime()>=ws;}).length;
}
function getCompletedToday(op){
  var ts=getTodayStart().getTime();
  return getAllDone(op).filter(function(c){var t=parseTS(c.completedAt);return t&&t.getTime()>=ts;}).length;
}
function getAvgEvasion(op){
  var done=getAllDone(op).filter(function(c){return c.completedAt&&c.startedAt;});
  if(done.length===0)return null;
  var total=done.reduce(function(sum,c){return sum+getNetElapsed(c.startedAt,c.completedAt,c.operatore);},0);
  return total/done.length;
}
function getStuckItems(){
  return commesse.filter(function(c){return c.stato==='PROGRESS'&&c.startedAt;}).map(function(c){
    return Object.assign({},c,{elapsed:getNetElapsed(c.startedAt,null,c.operatore)});
  }).sort(function(a,b){return b.elapsed-a.elapsed;});
}

// DRAG & DROP
// =============================================
var dragId=null,dragFromOp=null,dropTargetId=null,dropPosition=null,dropTargetOp=null;
function onCardDragStart(e,id,op){if(!isAdmin){e.preventDefault();return;}dragId=id;dragFromOp=op;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);requestAnimationFrame(function(){var el=document.getElementById('card-'+id);if(el)el.classList.add('dragging');});}
function onCardDragEnd(e){
  if(dragId&&isAdmin){
    if(dropTargetId&&dropTargetId!==dragId){var di=commesse.find(function(c){return c.id===dragId;});if(di){commesse=commesse.filter(function(c){return c.id!==dragId;});var top2=null;for(var i=0;i<commesse.length;i++){if(commesse[i].id===dropTargetId){top2=commesse[i].operatore;break;}}di.operatore=top2||dragFromOp;var ti=-1;for(var j=0;j<commesse.length;j++){if(commesse[j].id===dropTargetId){ti=j;break;}}commesse.splice(dropPosition==='below'?ti+1:ti,0,di);saveToCloud();}}
    else if(dropTargetOp&&dropTargetOp!==dragFromOp&&!dropTargetId){var di2=commesse.find(function(c){return c.id===dragId;});if(di2){di2.operatore=dropTargetOp;saveToCloud();}}
  }
  resetDrag();
}
function resetDrag(){dragId=null;dragFromOp=null;dropTargetId=null;dropPosition=null;dropTargetOp=null;document.querySelectorAll('.dragging,.drag-above,.drag-below,.drag-over-col').forEach(function(el){el.classList.remove('dragging','drag-above','drag-below','drag-over-col');});}
function onCardDragOver(e,id){e.preventDefault();e.stopPropagation();if(!isAdmin||id===dragId)return;e.dataTransfer.dropEffect='move';var rect=e.currentTarget.getBoundingClientRect(),pos=e.clientY<rect.top+rect.height/2?'above':'below';if(dropTargetId!==id||dropPosition!==pos){document.querySelectorAll('.drag-above,.drag-below').forEach(function(el){el.classList.remove('drag-above','drag-below');});dropTargetId=id;dropPosition=pos;e.currentTarget.classList.add(pos==='above'?'drag-above':'drag-below');}}
function onCardDragLeave(e,id){if(dropTargetId===id)e.currentTarget.classList.remove('drag-above','drag-below');}
function onColDragOver(e){e.preventDefault();if(isAdmin)e.dataTransfer.dropEffect='move';}
function onColDragEnter(e,op){e.preventDefault();if(!isAdmin)return;dropTargetOp=op;document.querySelectorAll('.column').forEach(function(el){el.classList.remove('drag-over-col');});e.currentTarget.classList.add('drag-over-col');}
function onColDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag-over-col');}

function tryLogin(){var pw=document.getElementById('pw-input').value;if(pw===ADMIN_PASSWORD){isAdmin=true;showPwModal=false;pwError='';localStorage.setItem(ADMIN_KEY,'1');render();}else{pwError='Password errata';render();setTimeout(function(){var el=document.getElementById('pw-input');if(el)el.focus();},50);}}
function logout(){isAdmin=false;localStorage.removeItem(ADMIN_KEY);render();}
function openNewForm(){showForm=true;editingId=null;formData={descrizione:'',operatore:'Leandro',stato:'TODO',note:''};render();}
function openLogin(){showPwModal=true;pwError='';render();}
function confirmArchive(){showArchiveConfirm=true;render();}

function addCommessa(){
  if(!isAdmin)return;
  var desc=document.getElementById('f-desc').value.trim(),note=document.getElementById('f-note').value.trim();
  if(!desc)return;formData.descrizione=desc;formData.note=note;
  var now=new Date().toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  if(editingId){
    commesse=commesse.map(function(c){return c.id===editingId?Object.assign({},c,{descrizione:formData.descrizione,operatore:formData.operatore,stato:formData.stato,note:formData.note}):c;});
    editingId=null;
  }else{
    commesse.push({id:genId(),descrizione:formData.descrizione,operatore:formData.operatore,stato:formData.stato,note:formData.note,creata:now,createdAt:nowISO()});
    playChime();
  }
  formData={descrizione:'',operatore:'Leandro',stato:'TODO',note:''};showForm=false;saveToCloud();
}
function deleteItem(id){if(!isAdmin)return;commesse=commesse.filter(function(c){return c.id!==id;});confirmDelete=null;saveToCloud();}
function changeStato(id,s){
  commesse=commesse.map(function(c){
    if(c.id!==id)return c;
    var u=Object.assign({},c,{stato:s});
    if(s==='PROGRESS'&&c.stato!=='PROGRESS')u.startedAt=nowISO();
    if(s==='DONE'&&c.stato!=='DONE'){u.completedAt=nowISO();if(!u.startedAt)u.startedAt=u.createdAt||nowISO();}
    if(s==='TODO'){delete u.startedAt;delete u.completedAt;}
    return u;
  });
  saveToCloud();
}
function moveTo(id,op){if(!isAdmin)return;commesse=commesse.map(function(c){return c.id===id?Object.assign({},c,{operatore:op}):c;});saveToCloud();}
function startEdit(id){if(!isAdmin)return;var c=commesse.find(function(x){return x.id===id;});if(!c)return;formData={descrizione:c.descrizione,operatore:c.operatore,stato:c.stato,note:c.note||''};editingId=id;showForm=true;render();}

}
