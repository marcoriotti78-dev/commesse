<body>
<div id="app"></div>
<script>
const JSONBIN_API_KEY='$2a$10$PSDa.UDyYUdLIuiwEJ4AIuGeKsdmgZN70PiiTeUDGhdLP4vqqdize';
const JSONBIN_BIN_ID='69c4ecdcaa77b81da91ef8b8';
const ADMIN_PASSWORD='Alma';

let commesse=[],syncStatus='loading',isAdmin=false;
const LOCAL_KEY='almatech-commesse-local',ADMIN_KEY='almatech-admin';
try{if(localStorage.getItem(ADMIN_KEY)==='1')isAdmin=true;}catch(e){}

async function loadFromCloud(){
  syncStatus='loading';render();
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID+'/latest',{headers:{'X-Master-Key':JSONBIN_API_KEY}});
    if(!r.ok)throw new Error('Fetch failed');
    const data=await r.json(),rec=data.record;
    commesse=Array.isArray(rec)?rec:(Array.isArray(rec.commesse)?rec.commesse:[]);
    localStorage.setItem(LOCAL_KEY,JSON.stringify(commesse));syncStatus='ok';
  }catch(e){
    try{const d=localStorage.getItem(LOCAL_KEY);if(d)commesse=JSON.parse(d);}catch(x){}
    syncStatus='error';
  }
  render();
}
async function saveToCloud(){
  localStorage.setItem(LOCAL_KEY,JSON.stringify(commesse));syncStatus='loading';render();
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+JSONBIN_BIN_ID,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_API_KEY},body:JSON.stringify({commesse:commesse})});
    if(!r.ok)throw new Error('Save failed');syncStatus='ok';
  }catch(e){syncStatus='error';}
  render();
}
setInterval(loadFromCloud,15000);

// Update timers every minute
setInterval(()=>{if(commesse.some(c=>c.stato==='PROGRESS'))render();},60000);

function playChime(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const tone=(f,s,d,v=0.15)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+s);g.gain.setValueAtTime(v,ctx.currentTime+s);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+s+d);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d);};tone(587,0,0.2,0.2);tone(740,0.12,0.2,0.18);tone(880,0.24,0.35,0.15);}catch(e){}
}

let showForm=false,showPwModal=false,editingId=null,filterStato='ALL',confirmDelete=null,expandedNote=null,pwError='';
let formData={descrizione:'',operatore:'Leandro',stato:'TODO',note:''};
const STATI={TODO:{label:'Da fare',color:'#F59E0B'},PROGRESS:{label:'In corso',color:'#3B82F6'},DONE:{label:'Completato',color:'#10B981'}};
const OPS=['Leandro','Andrea'];
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

// =============================================
// TIME HELPERS (con sottrazione pause pranzo)
// =============================================
// Pause pranzo: Leandro 12:00-13:00, Andrea 12:30-13:30
const LUNCH={Leandro:{start:12,end:13},Andrea:{start:12.5,end:13.5}};

function nowISO(){return new Date().toISOString();}
function parseTS(ts){if(!ts)return null;const d=new Date(ts);return isNaN(d.getTime())?null:d;}
function formatDuration(ms){
  if(!ms||ms<0)return'';
  const mins=Math.floor(ms/60000),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
  if(days>0)return days+'g '+(hrs%24)+'h';
  if(hrs>0)return hrs+'h '+(mins%60)+'m';
  return mins+'m';
}
function getTimerClass(ms){
  if(!ms)return'timer-ok';
  const hrs=ms/3600000;
  if(hrs>=8)return'timer-danger';
  if(hrs>=4)return'timer-warn';
  return'timer-ok';
}

// Calcola i minuti di pausa pranzo che cadono tra start e end
function getLunchMinutes(startDate,endDate,operatore){
  if(!startDate||!endDate)return 0;
  const lunch=LUNCH[operatore];
  if(!lunch)return 0;
  let totalPause=0;
  // Itera su ogni giorno tra start e end
  const d=new Date(startDate);d.setHours(0,0,0,0);
  const endDay=new Date(endDate);endDay.setHours(23,59,59,999);
  while(d<=endDay){
    // Pausa pranzo di questo giorno
    const lStart=new Date(d);lStart.setHours(Math.floor(lunch.start),(lunch.start%1)*60,0,0);
    const lEnd=new Date(d);lEnd.setHours(Math.floor(lunch.end),(lunch.end%1)*60,0,0);
    // Overlap tra [startDate,endDate] e [lStart,lEnd]
    const overlapStart=Math.max(startDate.getTime(),lStart.getTime());
    const overlapEnd=Math.min(endDate.getTime(),lEnd.getTime());
    if(overlapEnd>overlapStart) totalPause+=(overlapEnd-overlapStart);
    d.setDate(d.getDate()+1);
  }
  return totalPause;
}

// Tempo netto (senza pausa pranzo)
function getNetElapsed(startISO,endISO,operatore){
  const s=parseTS(startISO),e=endISO?parseTS(endISO):new Date();
  if(!s||!e)return 0;
  const gross=e.getTime()-s.getTime();
  const pause=getLunchMinutes(s,e,operatore);
  return Math.max(0,gross-pause);
}

// Weekly stats
function getWeekStart(){
  const d=new Date();d.setHours(0,0,0,0);
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  d.setDate(diff);return d;
}
function getTodayStart(){const d=new Date();d.setHours(0,0,0,0);return d;}

function getCompletedThisWeek(op){
  const ws=getWeekStart().getTime();
  return commesse.filter(c=>c.operatore===op&&c.stato==='DONE'&&c.completedAt&&parseTS(c.completedAt)&&parseTS(c.completedAt).getTime()>=ws).length;
}
function getCompletedToday(op){
  const ts=getTodayStart().getTime();
  return commesse.filter(c=>c.operatore===op&&c.stato==='DONE'&&c.completedAt&&parseTS(c.completedAt)&&parseTS(c.completedAt).getTime()>=ts).length;
}
function getAvgEvasion(op){
  const done=commesse.filter(c=>c.operatore===op&&c.completedAt&&c.startedAt);
  if(done.length===0)return null;
  const total=done.reduce((sum,c)=>sum+getNetElapsed(c.startedAt,c.completedAt,c.operatore),0);
  return total/done.length;
}
function getStuckItems(){
  return commesse.filter(c=>c.stato==='PROGRESS'&&c.startedAt).map(c=>{
    const elapsed=getNetElapsed(c.startedAt,null,c.operatore);
    return{...c,elapsed};
  }).sort((a,b)=>b.elapsed-a.elapsed);
}

// =============================================
// DRAG & DROP
// =============================================
let dragId=null,dragFromOp=null,dropTargetId=null,dropPosition=null,dropTargetOp=null;

function onCardDragStart(e,id,op){
  if(!isAdmin){e.preventDefault();return;}
  dragId=id;dragFromOp=op;e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',id);
  requestAnimationFrame(()=>{const el=document.getElementById('card-'+id);if(el)el.classList.add('dragging');});
}
function onCardDragEnd(e){
  if(dragId&&isAdmin){
    if(dropTargetId&&dropTargetId!==dragId){
      const dragItem=commesse.find(c=>c.id===dragId);
      if(dragItem){
        commesse=commesse.filter(c=>c.id!==dragId);
        const targetOp=commesse.find(c=>c.id===dropTargetId)?.operatore||dragFromOp;
        dragItem.operatore=targetOp;
        const targetIdx=commesse.findIndex(c=>c.id===dropTargetId);
        commesse.splice(dropPosition==='below'?targetIdx+1:targetIdx,0,dragItem);
        saveToCloud();
      }
    }else if(dropTargetOp&&dropTargetOp!==dragFromOp&&!dropTargetId){
      const dragItem=commesse.find(c=>c.id===dragId);
      if(dragItem){dragItem.operatore=dropTargetOp;saveToCloud();}
    }
  }
  resetDrag();
}
function resetDrag(){
  dragId=null;dragFromOp=null;dropTargetId=null;dropPosition=null;dropTargetOp=null;
  document.querySelectorAll('.dragging,.drag-above,.drag-below,.drag-over-col').forEach(el=>el.classList.remove('dragging','drag-above','drag-below','drag-over-col'));
}
function onCardDragOver(e,id){
  e.preventDefault();e.stopPropagation();if(!isAdmin||id===dragId)return;
  e.dataTransfer.dropEffect='move';
  const rect=e.currentTarget.getBoundingClientRect(),pos=e.clientY<rect.top+rect.height/2?'above':'below';
  if(dropTargetId!==id||dropPosition!==pos){
    document.querySelectorAll('.drag-above,.drag-below').forEach(el=>el.classList.remove('drag-above','drag-below'));
    dropTargetId=id;dropPosition=pos;e.currentTarget.classList.add(pos==='above'?'drag-above':'drag-below');
  }
}
function onCardDragLeave(e,id){if(dropTargetId===id)e.currentTarget.classList.remove('drag-above','drag-below');}
function onColDragOver(e){e.preventDefault();if(isAdmin)e.dataTransfer.dropEffect='move';}
function onColDragEnter(e,op){e.preventDefault();if(!isAdmin)return;dropTargetOp=op;document.querySelectorAll('.column').forEach(el=>el.classList.remove('drag-over-col'));e.currentTarget.classList.add('drag-over-col');}
function onColDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag-over-col');}

// =============================================
// ACTIONS
// =============================================
function tryLogin(){
  const pw=document.getElementById('pw-input').value;
  if(pw===ADMIN_PASSWORD){isAdmin=true;showPwModal=false;pwError='';localStorage.setItem(ADMIN_KEY,'1');render();}
  else{pwError='Password errata';render();setTimeout(()=>{const el=document.getElementById('pw-input');if(el)el.focus();},50);}
}
function logout(){isAdmin=false;localStorage.removeItem(ADMIN_KEY);render();}

function addCommessa(){
  if(!isAdmin)return;
  const desc=document.getElementById('f-desc').value.trim(),note=document.getElementById('f-note').value.trim();
  if(!desc)return;
  formData.descrizione=desc;formData.note=note;
  const now=new Date().toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  if(editingId){
    commesse=commesse.map(c=>c.id===editingId?{...c,descrizione:formData.descrizione,operatore:formData.operatore,stato:formData.stato,note:formData.note}:c);
    editingId=null;
  }else{
    commesse.push({id:genId(),descrizione:formData.descrizione,operatore:formData.operatore,stato:formData.stato,note:formData.note,creata:now,createdAt:nowISO()});
    playChime();
  }
  formData={descrizione:'',operatore:'Leandro',stato:'TODO',note:''};
  showForm=false;saveToCloud();
}
function deleteItem(id){if(!isAdmin)return;commesse=commesse.filter(c=>c.id!==id);confirmDelete=null;saveToCloud();}

function changeStato(id,s){
  commesse=commesse.map(c=>{
    if(c.id!==id)return c;
    const updated={...c,stato:s};
    if(s==='PROGRESS'&&c.stato!=='PROGRESS') updated.startedAt=nowISO();
    if(s==='DONE'&&c.stato!=='DONE') updated.completedAt=nowISO();
    if(s==='TODO'){delete updated.startedAt;delete updated.completedAt;}
    return updated;
  });
  saveToCloud();
}

function moveTo(id,op){if(!isAdmin)return;commesse=commesse.map(c=>c.id===id?{...c,operatore:op}:c);saveToCloud();}
function startEdit(id){
  if(!isAdmin)return;const c=commesse.find(x=>x.id===id);if(!c)return;
  formData={descrizione:c.descrizione,operatore:c.operatore,stato:c.stato,note:c.note||''};
  editingId=id;showForm=true;render();
}

// =============================================
// RENDER
// =============================================
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  const app=document.getElementById('app');
  const getItems=(op)=>{let f=commesse.filter(c=>c.operatore===op);if(filterStato!=='ALL')f=f.filter(c=>c.stato===filterStato);return f;};
  const countBy=(op,s)=>commesse.filter(c=>c.operatore===op&&c.stato===s).length;

  // Leaderboard data
  const weekA=getCompletedThisWeek('Andrea'),weekL=getCompletedThisWeek('Leandro');
  const todayA=getCompletedToday('Andrea'),todayL=getCompletedToday('Leandro');
  const leaderEmoji=(a,b)=>a>b?'🥇':(a===b?'🤝':'');
  
  // Admin stats
  const avgA=getAvgEvasion('Andrea'),avgL=getAvgEvasion('Leandro');
  const stuck=getStuckItems();

  app.innerHTML=`
    <div class="header">
      <div class="header-inner">
        <div class="logo-area">
          <div><span class="logo-alma">ALMA</span><span class="logo-tech">tech</span></div>
          <div class="logo-sep"></div>
          <div class="logo-sub"><p>Gestione Commesse</p><p>Magazzino</p></div>
        </div>
        <div class="header-actions">
          <div class="sync-bar" onclick="loadFromCloud()" title="Clicca per aggiornare">
            <span class="sync-dot ${syncStatus==='ok'?'sync-ok':syncStatus==='loading'?'sync-loading':'sync-error'}"></span>
            ${syncStatus==='ok'?'Sincronizzato':syncStatus==='loading'?'Sincronizzazione...':'Offline'}
          </div>
          ${isAdmin?`<span class="admin-badge" onclick="logout()" title="Clicca per uscire">🔓 Admin</span>`:`<span class="login-badge" onclick="showPwModal=true;pwError='';render()">🔒 Login</span>`}
          <div class="filters">
            <button class="filter-btn ${filterStato==='ALL'?'active':''}" style="${filterStato==='ALL'?'background:#78909C;color:#fff':''}" onclick="filterStato='ALL';render()">Tutti</button>
            ${Object.entries(STATI).map(([k,v])=>`<button class="filter-btn ${filterStato===k?'active':''}" style="${filterStato===k?'background:'+v.color:''}" onclick="filterStato='${k}';render()">${v.label}</button>`).join('')}
          </div>
          ${isAdmin?`<button class="btn-new" onclick="showForm=true;editingId=null;formData={descrizione:'',operatore:'Leandro',stato:'TODO',note:''};render()">+ Nuova</button>`:''}
        </div>
      </div>
    </div>

    <!-- Leaderboard (visible to all) -->
    <div class="leaderboard">
      <div class="lb-card">
        <div class="lb-section">
          <span style="font-size:15px">🏆</span>
          <span class="lb-label">Settimana</span>
          <span class="lb-score" style="background:${weekL>=weekA?'rgba(99,102,241,0.1);color:#6366F1':'rgba(226,235,248,0.5);color:#78909C'}">${weekL>weekA?'🥇 ':''}Leandro: ${weekL}</span>
          <span class="lb-score" style="background:${weekA>=weekL?'rgba(0,145,234,0.1);color:#0091EA':'rgba(226,235,248,0.5);color:#78909C'}">${weekA>weekL?'🥇 ':''}Andrea: ${weekA}</span>
          ${weekA===weekL&&weekA>0?'<span style="font-size:12px">🤝 Parità!</span>':''}
        </div>
        <div class="lb-section">
          <span class="lb-today">📅 Oggi — Leandro: ${todayL} | Andrea: ${todayA}</span>
        </div>
      </div>
    </div>

    <!-- Admin stats (only for admin) -->
    ${isAdmin?`
    <div class="admin-stats">
      <div class="stats-card">
        <div class="stats-title">📊 Statistiche dettagliate (solo admin)</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-name">⏱️ Tempo medio evasione — Leandro</div>
            <div class="stat-val">${avgL?formatDuration(avgL):'—'}</div>
            <div class="stat-sub">da "In corso" a "Completato"</div>
          </div>
          <div class="stat-box">
            <div class="stat-name">⏱️ Tempo medio evasione — Andrea</div>
            <div class="stat-val">${avgA?formatDuration(avgA):'—'}</div>
            <div class="stat-sub">da "In corso" a "Completato"</div>
          </div>
        </div>
        ${stuck.length>0?`
        <div class="stuck-list">
          <div style="font-size:11px;font-weight:600;color:#546E7A;margin-bottom:6px">⚠️ Commesse in corso (ordinate per durata)</div>
          ${stuck.map(c=>`<div class="stuck-item">
            <span>${esc(c.descrizione)} <span style="color:#90A4AE">(${c.operatore})</span></span>
            <span class="stuck-time">${formatDuration(c.elapsed)}</span>
          </div>`).join('')}
        </div>`:''}
      </div>
    </div>`:''}

    <div class="columns">
      ${OPS.map(op=>{
        const items=getItems(op);const altroOp=op==='Leandro'?'Andrea':'Leandro';
        return`
        <div class="column" ondragover="onColDragOver(event)" ondragenter="onColDragEnter(event,'${op}')" ondrop="onColDrop(event)">
          <div class="col-header">
            <div class="col-left">
              <div class="col-avatar ${op.toLowerCase()}">${op[0]}</div>
              <div class="col-info"><h2>${op}</h2><p>${commesse.filter(c=>c.operatore===op).length} commesse</p></div>
            </div>
            <div class="badges">
              ${[{s:'TODO',c:'#F59E0B'},{s:'PROGRESS',c:'#3B82F6'},{s:'DONE',c:'#10B981'}].map(b=>{const n=countBy(op,b.s);return n>0?`<span class="badge" style="background:${b.c}18;color:${b.c}">${n}</span>`:'';}).join('')}
            </div>
          </div>
          <div class="cards">
            ${items.length===0?`<div class="empty-col">${dragId?'🎯 Rilascia qui':'Nessuna commessa'}</div>`:items.map(c=>{
              const stato=STATI[c.stato];const hasNote=c.note&&c.note.trim().length>0;const noteOpen=expandedNote===c.id;
              // Timer for in-progress items
              let timerHtml='';
              if(c.stato==='PROGRESS'&&c.startedAt){
                const elapsed=getNetElapsed(c.startedAt,null,c.operatore);
                timerHtml=`<div class="timer-badge ${getTimerClass(elapsed)}">⏱️ In corso da ${formatDuration(elapsed)} (netto)</div>`;
              }
              return`
              <div class="card ${isAdmin?'admin-card':''}" id="card-${c.id}" ${isAdmin?`draggable="true" ondragstart="onCardDragStart(event,'${c.id}','${op}')" ondragend="onCardDragEnd(event)" ondragover="onCardDragOver(event,'${c.id}')" ondragleave="onCardDragLeave(event,'${c.id}')"`:''} style="border-left:3px solid ${stato.color}">
                <div class="card-top">
                  <div class="card-desc">${esc(c.descrizione)}</div>
                  ${isAdmin?`<div class="card-actions">
                    <button class="btn-icon" onclick="startEdit('${c.id}')">✏️</button>
                    ${confirmDelete===c.id?`<button class="btn-icon confirm-del" onclick="deleteItem('${c.id}')">OK</button>`:`<button class="btn-icon" onclick="confirmDelete='${c.id}';render()">🗑️</button>`}
                  </div>`:''}
                </div>
                ${timerHtml}
                ${hasNote?`<div class="note-block" onclick="expandedNote=${noteOpen?'null':"'"+c.id+"'"};render()">
                  <div class="note-header"><span style="font-size:11px">📝</span><span class="note-label">Note</span><span class="note-toggle">${noteOpen?'▲':'▼'}</span></div>
                  ${noteOpen?`<div class="note-text">${esc(c.note)}</div>`:''}
                </div>`:''}
                <div class="card-bottom">
                  <div class="status-btns">
                    ${Object.entries(STATI).map(([k,v])=>`<button class="status-btn ${c.stato===k?'active':''}" style="${c.stato===k?'background:'+v.color:''}" onclick="changeStato('${c.id}','${k}')">${v.label}</button>`).join('')}
                  </div>
                  ${isAdmin?`<button class="move-btn" onclick="moveTo('${c.id}','${altroOp}')">→ ${altroOp}</button>`:''}
                </div>
                ${c.creata?`<div class="card-time">${esc(c.creata)}</div>`:''}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
    ${showForm&&isAdmin?`
    <div class="modal-overlay" onclick="showForm=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>${editingId?'Modifica commessa':'Nuova commessa'}</h3>
        <div class="form-group">
          <label class="form-label">Descrizione lavoro</label>
          <textarea class="form-input" id="f-desc" rows="3" placeholder="Es: Preparare spedizione ordine #1234...">${esc(formData.descrizione)}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">📝 Note aggiuntive <span class="form-label-opt">(opzionale)</span></label>
          <textarea class="form-input form-input-note" id="f-note" rows="2" placeholder="Dettagli extra, istruzioni, riferimenti...">${esc(formData.note)}</textarea>
        </div>
        <div class="form-grid">
          <div>
            <label class="form-label">Assegna a</label>
            <div class="assign-btns">
              ${OPS.map(op=>`<button class="assign-btn ${formData.operatore===op?'active':''} ${op.toLowerCase()}" onclick="formData.operatore='${op}';render()">${op}</button>`).join('')}
            </div>
          </div>
          <div>
            <label class="form-label">Stato</label>
            <div class="stato-btns">
              ${Object.entries(STATI).map(([k,v])=>`<button class="stato-btn-form ${formData.stato===k?'active':''}" style="${formData.stato===k?'background:'+v.color:''}" onclick="formData.stato='${k}';render()">${v.label}</button>`).join('')}
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="showForm=false;render()">Annulla</button>
          <button class="btn-submit" onclick="addCommessa()">${editingId?'Salva':'🔔 Aggiungi'}</button>
        </div>
      </div>
    </div>`:''}
    ${showPwModal&&!isAdmin?`
    <div class="modal-overlay" onclick="showPwModal=false;render()">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>🔒 Accesso Admin</h3>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="pw-input" id="pw-input" placeholder="Inserisci password..." onkeydown="if(event.key==='Enter')tryLogin()">
          ${pwError?`<div class="pw-error">${pwError}</div>`:''}
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="showPwModal=false;render()">Annulla</button>
          <button class="btn-submit" onclick="tryLogin()">Accedi</button>
        </div>
      </div>
    </div>`:''}
  `;
  if(showForm){const el=document.getElementById('f-desc');if(el)el.focus();}
  if(showPwModal){const el=document.getElementById('pw-input');if(el)el.focus();}
}

loadFromCloud();
</script>
</body>
</html>
